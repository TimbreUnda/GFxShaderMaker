# Create releases from version tags. Push a tag (e.g. v1.0.0) to trigger.
# Artifacts: Windows (GFxShaderMaker.exe) and Linux (GFxShaderMaker) executables.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact_name: GFxShaderMaker-Windows-x64
            exe_name: GFxShaderMaker.exe
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: GFxShaderMaker-Linux-x64
            exe_name: GFxShaderMaker

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish ${{ matrix.rid }}
        shell: bash
        run: |
          dotnet publish GFxShaderMaker.csproj \
            -p:ReleaseOnly=true \
            -f net8.0 \
            -r ${{ matrix.rid }} \
            -c Release \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o publish

      - name: Pack artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path publish\GFxShaderMaker.exe -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Pack artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x publish/GFxShaderMaker
          zip -j ${{ matrix.artifact_name }}.zip publish/GFxShaderMaker

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: GFxShaderMaker-Windows-x64

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: GFxShaderMaker-Linux-x64

      - name: Prepare release assets
        run: |
          for name in GFxShaderMaker-Windows-x64 GFxShaderMaker-Linux-x64; do
            if [ -f "$name.zip" ]; then
              : already at root
            elif [ -d "$name" ] && [ -f "$name/$name.zip" ]; then
              mv "$name/$name.zip" .
            else
              echo "::error::Artifact $name.zip not found (checked root and $name/)"
              exit 1
            fi
          done
          ls -la *.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            GFxShaderMaker-Windows-x64.zip
            GFxShaderMaker-Linux-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
